<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creaciones Musicales - AI Playlist</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2F4F4F',
                        secondary: '#E2E8E4',
                        accent: '#5F7367',
                        light: '#F8F9F8',
                        dark: '#1A1A1A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
            .border-rounded { border-radius: 16px; }
            .activa {
                border-left: 4px solid #2F4F4F;
                background-color: rgba(95, 115, 103, 0.15);
            }
        }
    </style>
</head>
<body class="bg-light text-dark font-sans">

<section class="py-16 px-6 bg-white">
  <div class="container mx-auto max-w-5xl">
    <h3 class="font-serif text-3xl font-semibold text-center mb-12 text-primary">Creaciones con Inteligencia Artificial</h3>

    <div class="bg-light p-6 border-rounded card-shadow mb-10 sticky top-4 z-40 hidden" id="reproductorContenedor">
      <div class="flex flex-col md:flex-row gap-6 items-center justify-between">
        
        <div class="flex items-center gap-4 w-full md:w-1/3">
          <i class="fa fa-music text-4xl text-accent animate-pulse"></i>
          <div class="truncate w-full">
            <h4 id="tituloActual" class="font-serif text-xl font-semibold text-dark truncate">Cargando...</h4>
            <p class="text-sm text-gray-600">Creada con Suno AI</p>
          </div>
        </div>

        <div class="w-full md:w-2/3 flex flex-col gap-2">
          <audio id="reproductor" preload="metadata"></audio>

          <div class="flex items-center gap-2 w-full">
            <span id="tiempoActual" class="text-xs text-gray-500 min-w-[35px]">0:00</span>
            <input type="range" id="progreso" min="0" max="100" value="0" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary">
            <span id="tiempoTotal" class="text-xs text-gray-500 min-w-[35px]">0:00</span>
          </div>

          <div class="flex items-center justify-between mt-1 gap-3">
            <div class="flex items-center gap-6">
              <button id="btnAnterior" class="text-primary hover:text-accent text-xl transition-colors"><i class="fa fa-step-backward"></i></button>
              <button id="btnPlay" class="text-primary hover:text-accent text-3xl transition-colors"><i class="fa fa-play-circle"></i></button>
              <button id="btnSiguiente" class="text-primary hover:text-accent text-xl transition-colors"><i class="fa fa-step-forward"></i></button>
            </div>
            
            <div class="flex items-center gap-2">
              <i class="fa fa-volume-up text-gray-600"></i>
              <input type="range" id="volumen" min="0" max="1" step="0.01" value="0.7" class="w-24 cursor-pointer accent-primary">
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="listaCanciones" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <p class="col-span-full text-center text-gray-500 italic">Cargando lista de canciones...</p>
    </div>

    <p class="text-center text-gray-500 mt-10 italic">
      La inteligencia artificial es una herramienta más: igual que en el desarrollo de software, transforma ideas en resultados.
    </p>
  </div>
</section>

<script>
let canciones = [];
let indiceActual = 0;

const reproductorContenedor = document.getElementById('reproductorContenedor');
const reproductor = document.getElementById('reproductor');
const tituloActual = document.getElementById('tituloActual');
const btnAnterior = document.getElementById('btnAnterior');
const btnPlay = document.getElementById('btnPlay');
const btnSiguiente = document.getElementById('btnSiguiente');
const controlVolumen = document.getElementById('volumen');
const listaContenedor = document.getElementById('listaCanciones');
const barraProgreso = document.getElementById('progreso');
const tiempoActual = document.getElementById('tiempoActual');
const tiempoTotal = document.getElementById('tiempoTotal');

// 🔄 1. Leer automáticamente el archivo JSON local/servidor
async function cargarPlaylist() {
  try {
    const respuesta = await fetch('canciones.json');
    canciones = await respuesta.json();
    
    if (!canciones || canciones.length === 0) {
      listaContenedor.innerHTML = '<p class="col-span-full text-center text-red-500 italic">No hay canciones disponibles en el archivo de configuración.</p>';
      return;
    }

    reproductorContenedor.classList.remove('hidden');
    generarLista();
    cargarCancion(0);

  } catch (error) {
    console.error("Error al cargar canciones.json:", error);
    listaContenedor.innerHTML = '<p class="col-span-full text-center text-red-500 italic">Error al cargar la lista de reproducción. Asegúrate de tener el archivo "canciones.json".</p>';
  }
}

window.addEventListener('DOMContentLoaded', cargarPlaylist);

// 🎵 2. Controladores del Reproductor
function cargarCancion(indice) {
  if (indice < 0) indice = canciones.length - 1;
  if (indice >= canciones.length) indice = 0;

  indiceActual = indice;
  const cancion = canciones[indice];

  reproductor.src = cancion.url;
  tituloActual.textContent = cancion.nombre;
  
  barraProgreso.value = 0;
  tiempoActual.textContent = "0:00";

  document.querySelectorAll('.tarjeta').forEach((tarjeta, i) => {
    tarjeta.classList.toggle('activa', i === indice);
  });
}

function togglePlay() {
  if (reproductor.paused) {
    reproductor.play();
    btnPlay.innerHTML = '<i class="fa fa-pause-circle"></i>';
  } else {
    reproductor.pause();
    btnPlay.innerHTML = '<i class="fa fa-play-circle"></i>';
  }
}

function anterior() { cargarCancion(indiceActual - 1); reproductor.play(); btnPlay.innerHTML = '<i class="fa fa-pause-circle"></i>'; }
function siguiente() { cargarCancion(indiceActual + 1); reproductor.play(); btnPlay.innerHTML = '<i class="fa fa-pause-circle"></i>'; }

// ⏱️ 3. Formatos y Tiempos
function formatearTiempo(segundos) {
  if (isNaN(segundos)) return "0:00";
  const m = Math.floor(segundos / 60);
  const s = Math.floor(segundos % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

reproductor.addEventListener('timeupdate', () => {
  if (reproductor.duration) {
    const porcentaje = (reproductor.currentTime / reproductor.duration) * 100;
    barraProgreso.value = porcentaje;
    tiempoActual.textContent = formatearTiempo(reproductor.currentTime);
  }
});

reproductor.addEventListener('loadedmetadata', () => {
  tiempoTotal.textContent = formatearTiempo(reproductor.duration);
});

barraProgreso.addEventListener('input', () => {
  const nuevoTiempo = (barraProgreso.value / 100) * reproductor.duration;
  reproductor.currentTime = nuevoTiempo;
});

// 📋 4. Renderizar tarjetas en la interfaz
function generarLista() {
  listaContenedor.innerHTML = '';
  canciones.forEach((cancion, indice) => {
    const tarjeta = document.createElement('div');
    tarjeta.className = 'tarjeta bg-light p-5 border-rounded card-shadow hover:translate-y-[-4px] transition-all cursor-pointer flex flex-col justify-between';
    tarjeta.onclick = () => { cargarCancion(indice); reproductor.play(); btnPlay.innerHTML = '<i class="fa fa-pause-circle"></i>'; };

    tarjeta.innerHTML = `
      <div>
        <div class="flex items-center gap-3 mb-3">
          <i class="fa fa-music text-2xl text-accent"></i>
          <h4 class="font-serif text-lg font-semibold text-dark line-clamp-2">${cancion.nombre}</h4>
        </div>
        <p class="text-gray-600 text-sm">Streaming Automático</p>
      </div>
      <div>
        <a href="${cancion.url}" download="${cancion.nombre}.mp3" class="inline-block mt-3 text-primary text-sm hover:underline" onclick="event.stopPropagation();" target="_blank">
          <i class="fa fa-download mr-1"></i> Descargar
        </a>
      </div>
    `;
    listaContenedor.appendChild(tarjeta);
  });
}

// Eventos
btnPlay.addEventListener('click', togglePlay);
btnAnterior.addEventListener('click', anterior);
btnSiguiente.addEventListener('click', siguiente);
controlVolumen.addEventListener('input', () => reproductor.volume = controlVolumen.value);
reproductor.addEventListener('ended', siguiente);
</script>

</body>
</html>
